
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://api.iconify.design/ph:planet-fill.svg?color=%2301cb63" type="image/x-icon">
    <title>The Daily Nebula</title>
    <link rel="stylesheet" href="/The Daily Nebula [ Daily Calendar Powered by NASA API]/style.css">
    <link rel="stylesheet" href="/The Daily Nebula [ Daily Calendar Powered by NASA API]/calendar.css">
</head>
<body>
    <div class="intro">
        <h1>The Daily Nebula Calendar</h1>
        <p>Daily photos of our universe, powered by NASA API</p>
    </div>
    <div class="calendar">

        <div class="header">
            <button id="previousBtn">
                <img src="https://api.iconify.design/material-symbols:chevron-left.svg" alt="">
            </button>

            <div class="monthYear" id="monthYear"></div>

            <button id="nextBtn">
                <img src="https://api.iconify.design/material-symbols:chevron-right.svg" alt="">
            </button>
        </div>

        <div class="days">
            <div class="day">Mon</div>
            <div class="day">Tue</div>
            <div class="day">Wed</div>
            <div class="day">Thr</div>
            <div class="day">Fri</div>
            <div class="day">Sat</div>
            <div class="day">Sun</div>
        </div>

        <div class="dates" id="dates"></div>

    </div>

    <div class="events" id="events">
        <h2 class="title"></h2>
        <p class="description"></p>
    </div>


    
    <section>   
        <span class="date"></span>
        
    </section>
    <script src="/The Daily Nebula [ Daily Calendar Powered by NASA API]/script.js"></script>
    <script src="/The Daily Nebula [ Daily Calendar Powered by NASA API]/calendar.js"></script>
</body>
</html>
