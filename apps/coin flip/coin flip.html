<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/coin flip.css">
    <link rel="icon" href="/assets/TRYLUCK GAMES color.png">
    <title>TRYLUCK - Coin Flip</title>
</head>
<body>
    

    <div class="container">
        <div class="intro">
            <div class="company">
                <img src="/assets/TRYLUCK logo.png" alt="">
                <h1>TRYLUCK</h1>
            </div>
            <span>Coin Flip</span>
            <p>The ultimate coin flip app! Realistic flips, and an ad-free experience to help you make decisions or settle disputes with a tap.</p>
        </div>
        <div class="stats">
            <p id="heads-count">Heads: 0</p>
            <p id="tails-count">Tails: 0</p>
        </div>

        <div class="coin">
            <div class="heads">
                <img src="/assets/Front of Coin.png" alt="">
            </div>
            <div class="tails">
                <img src="/assets/Back of Coin.png" alt="">
            </div>
        </div>

        <div class="buttons">
            <div class="button">
                <button id="flip-button">Flip</button>
            </div>
    
            <div class="button">
                <button id="reset-button">Reset</button>
            </div>
        </div>
    </div>

    
    <script src="/coin flip.js"></script>
</body>
</html>
