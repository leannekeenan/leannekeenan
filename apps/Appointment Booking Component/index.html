<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking Component</title>
    <link rel="stylesheet" href="/Appointment Booking Component/assets/css/style.css">
    <link rel="stylesheet" href="/Appointment Booking Component/assets/css/mobile.css">
</head>
<body>
    <div class="booking-component">
        <div class="split">
            <div class="calendar-container container">
                <div class="calendar-header">
                    <button id="prev-month"><img src="/Appointment Booking Component/assets/images/ChevronLeft.png" alt=""></button>
                    <span id="current-month-year"></span>
                    <button id="next-month"><img src="/Appointment Booking Component/assets/images/ChevronRight.png" alt=""></button>
                </div>
                <div id="calendar"></div>
            </div>
            <div class="time-slots-container container">
                <h2 class="form-headline">Available Time Slots</h2>
                <div class="time-slots" id="time-slots"></div>
            </div>
        </div>

        <div class="user-info-container container">
            <h2 class="form-headline">Enter Your Information</h2>
            <form class="booking-form" id="booking-form">
                <div>
                    <label for="name">Name:</label>
                    <input type="text" id="name" required>
                </div>
                <div>
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" required>
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="service-types">
                    <label for="service">Service Type:</label>
                    <div class="custom-select-wrapper">
                      <div class="custom-select">
                        <div class="selected">Select a service</div>
                        <div class="options">
                          <div class="option" data-value="oil-change">Oil Change</div>
                          <div class="option" data-value="tire-change">Tire Change</div>
                          <div class="option" data-value="engine-check">Engine Check</div>
                          <div class="option" data-value="brake-repair">Brake Repair</div>
                          <div class="option" data-value="transmission-repair">Transmission Repair</div>
                        </div>
                      </div>
                    </div>
                    <select id="service" required style="display: none;">
                      <option value="oil-change">Oil Change</option>
                      <option value="tire-change">Tire Change</option>
                      <option value="engine-check">Engine Check</option>
                      <option value="brake-repair">Brake Repair</option>
                      <option value="transmission-repair">Transmission Repair</option>
                    </select>
                  </div>
                  
                  
                <div>
                    <label for="make"></label>Vehicle Make
                    <input type="text" id="make">
                </div>
    
                <div>
                    <label for="model"></label>Vehicle Model
                    <input type="text" id="model">
                </div>
    
                <div>
                    <label for="year"></label>Production Year
                    <input type="text" id="year">
                </div>
                <div class="form-buttons">
                    <button type="submit">Book Appointment</button>
                    <button id="clear-form-btn" type="button">Clear Form</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/Appointment Booking Component/assets/js/script.js"></script>
    <script src="/Appointment Booking Component/assets/js/server.js"></script>
    <script src="/Appointment Booking Component/assets/js/mailer.js"></script>
    <script src="/Appointment Booking Component/assets/js/select dropdown.js"></script>
</body>
</html>
