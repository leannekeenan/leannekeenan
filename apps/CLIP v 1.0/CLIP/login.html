<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/CLIP v 1.0/CLIP/assets/css/user form.css">
</head>
<body>
    <header>
        <span class="logo"><a href="/CLIP v 1.0/CLIP/index.html">CLIP</a></span>        
    </header>

   <main class="container">
    <div class="form-box glass">
        <h2>Login</h2>
        <form action="/CLIP v 1.0/CLIP/time management.html">          
                <div class="input-box" id="emailAddress">
                    <span class="icon">
                        <img src="https://api.iconify.design/streamline:sign-at-solid.svg?color=%232b2d42" alt="email-icon">
                    </span>
                    <input type="email" name="user-email" placeholder="Email Address" id="user-email">
                </div>

                <div class="input-box" id="password">
                    <span class="icon">
                        <img src="https://api.iconify.design/ri:lock-password-line.svg?color=%232b2d42" alt="create-password-icon">
                    </span>
                    <input type="password" name="user-password" placeholder="Password" id="user-password">
                </div>   
                
                <div class="options">
                    <label for="">
                        <input type="checkbox" name="" id="">
                        Remember Me
                    </label>
                    <div>
                        <h3>Need an account? <a href="/CLIP v 1.0/CLIP/signup.html">Signup</a></h3>
                    </div>
                </div>

                <button type="submit" class="submit">Submit</button>
        </form>
        
    </div>

   </main>
   
    <footer>

        <div>
            <div class="social">
                <a href=""><img src="/CLIP v 1.0/CLIP/assets/images/facebook logo.png" alt="facebook"></a>
                <a href=""><img src="/CLIP v 1.0/CLIP/assets/images/linkedin icon.png" alt="linkedin"></a>
                <a href=""><img src="/CLIP v 1.0/CLIP/assets/images/twitter icon.png" alt="twitter"></a>
            </div>
            <div class="details">
                <h2>CLIP</h2>
                <span>Redwood City, CA</span>
                <span>connect@clip.app</span>
    
            </div>
        </div>
        <h4>developed by <a href="https://leannekeenan.netlify.app"> Leanne Keenan</a></h4>
    </footer>
<script src="/CLIP v 1.0/CLIP/assets/js/login.js"></script>
</body>
</html>
