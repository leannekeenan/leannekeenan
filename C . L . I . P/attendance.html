<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.L.I.P - Attendance</title>
    <link rel="shortcut icon" href="/C . L . I . P/assets/MEDIA/C.L.I.P clear.png" type="image/x-icon">
    <link rel="stylesheet" href="/C . L . I . P/assets/CSS/common-internal-content.css">
    <link rel="stylesheet" href="/C . L . I . P/assets/CSS/attendance.css">
</head>
<body>
    <header>

        <a href="" class="logo">C.L.I.P</a>

        <input type="checkbox" name="" id="menu-bar">
        <label for="menu-bar">
            <img src="https://api.iconify.design/material-symbols:menu-rounded.svg?color=%23b0d7ff" alt="">
        </label>

        <nav class="navbar">
            <ul>
                <li class="current"><a href="attendance.html">Attendance</a></li>
                <li><a href="reports.html">Reports</a></li>
                <li><a href="management.html">Management</a></li>
                <li><a href="index.html">Logout</a></li>
            </ul>
        </nav>

    </header>

    <section class="timekeeping">
        <h2>Clock In / Clock Out</h2>
        <form action="" method="post">
            <fieldset class="officerData">
                <legend>Officer Information</legend>
                <input class="officerInfo" type="text" id="firstName" placeholder="First Name">
                <input class="officerInfo" type="text" id="lastName" placeholder="Last Name">
                <input class="officerInfo" type="text" id="employeeID" placeholder="ID Number">
            </fieldset>

            <fieldset class="shiftData">
                <legend>Shift Information</legend>
                <div class="shiftTime">
                   <div>
                    <input type="radio" name="shift" class="shiftOption" value="day" id="dayShift">Day
                    <input type="radio" name="shift" class="shiftOption" value="swing" id="swingShift">Swing
                    <input type="radio" name="shift" class="shiftOption" value="over" id="overnightShift">Overnight
                   </div>
                   <div>
                    <input type="radio" name="lunch" class="shiftOption" value="lunch" id="lunchShift">Lunch
                    <input type="radio" name="break" class="shiftOption" value="break" id="breakShift">break
                   </div>
                    <input class="officerInfo" type="date" id="todaysDate" placeholder="Today's Date">
                    <select class="officerInfo" id="campuses">
                        <option value="Choose One">Choose One</option>
                        <option value="Bayfront">Bayfront</option>
                        <option value="Classic">Classic</option>
                        <option value="Chilco">Chilco</option>
                        <option value="Gateway">Gateway</option>
                        <option value="Willow">Willow</option>
                        <option value="Events">Events</option>
                    </select>
                </div>
            </fieldset>
            
         
             
             
             

            <div class="clock"></div>

        <button class="submitButton" type="submit" id="submit">Submit</button>
        </form>

        
    </section>
    <section class="analytics">
        <table class="AnalyticsTable">
            <thead>
                <tr>
                    <th colspan="4">Clock History</th>
                </tr>
            </thead>
            <tbody>
                <tr class="dataHeaders">
                    <th>Date</th>
                    <th>ID</th>
                    <th>Campus</th>
                    <th>Shift</th>
                    <th>In</th>
                    <th>Out</th>
                   
                </tr>
               
            </tbody>
        </table>
    </section>
    
</body>
    <script src="/C . L . I . P/assets/JS/attendance.js"></script>
</html>
