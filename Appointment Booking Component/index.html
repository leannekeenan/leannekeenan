<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking Component</title>
    <link rel="stylesheet" href="/Appointment Booking Component/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.css" />
</head>
<body>
    <div id="appointment-scheduler">
        <h1>Schedule Your Car Maintenance</h1>
        <form id="appointment-form">
            <label for="service-type">Select Service Type:</label>
            <select id="service-type" name="service-type" required>
                <option value="oil-change">Oil Change</option>
                <option value="tire-rotation">Tire Rotation</option>
                <option value="brake-inspection">Brake Inspection</option>
            </select>

            <div id="calendar"></div>

            <button type="submit">Schedule Appointment</button>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.js"></script>
    <script src="/Appointment Booking Component/assets/js/script.js"></script>
    <script src="/Appointment Booking Component/assets/js/email.js"></script>
    <script src="/Appointment Booking Component/assets/js/calendar.js"></script>
</body>
</html>
