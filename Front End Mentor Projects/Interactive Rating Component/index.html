<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Rating Component
    </title>
    <link rel="stylesheet" href="/Front End Mentor Projects/Interactive Rating Component/style.css">
</head>
<body>

    <main class="container rate">
        <picture class="image">
            <img src="/Front End Mentor Projects/Interactive Rating Component/interactive-rating-component-main/interactive-rating-component-main/images/icon-star.svg" alt="">
        </picture>

        <section class="text">
            <h1 class="question">How did we do?</h1>
            <p class="about"> Please let us know how we did with your support request. All feedback is appreciated 
                to help us improve our offering!</p>
        </section>

        <fieldset class="ratings">
            <input type="text" class="rating" id="one" name="rate" value="1" readonly>
            <input type="text" class="rating" id="two" name="rate" value="2" readonly>
            <input type="text" class="rating" id="three" name="rate" value="3" readonly>
            <input type="text" class="rating" id="four" name="rate" value="4" readonly>
            <input type="text" class="rating" id="five" name="rate" value="5" readonly>
        </fieldset>

        <a class="btn" href="thank.html">
            Submit
        </a>
    </main>

    
</body>
<script src="/Front End Mentor Projects/Interactive Rating Component/script.js"></script>
</html>
