<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Sign-up Form with Success Message</title>
    <link rel="stylesheet" href="/Front End Mentor Projects/Newsletter Sign-Up Form/project/style.css">
    <link rel="stylesheet" href="/Front End Mentor Projects/Newsletter Sign-Up Form/project/mobile.css">
</head>
<body>
    <main class="container">
        <div class="text">
            <h1 class="title">
                Stay updated!
            </h1>

            <p class="join">
                Join 60,000+ product managers receiving monthly updates on:
            </p>

            <ul>
                <li>
                    Product discovery and building what matters
                </li>
                <li>
                    Measuring to ensure updates are a success
                </li>
                <li>
                    And much more!
                </li>
            </ul>

            <form action="" id="form">

                <div>
                    <div>
                        <label for="email" >Email Address</label>
                        <span aria-live="polite" id="email-error"></span>
                    </div>
                    <input class="form-input" type="text" name="email" id="email" required placeholder="email@company.com">  
                </div>

                <button type="submit">
                    Subscribe to monthly newsletter
                </button>

            </form>
        </div>

        <div class="image" alt="this is an image of icons representing an empty screenm a search window on an apple computer, a graph illustrating an increasing trend and a score of 94. The background colors are hues of orange, yellow and pink">
        </div>
    </main>
    <script src="/Front End Mentor Projects/Newsletter Sign-Up Form/project/script.js"></script>
</body>
</html>
