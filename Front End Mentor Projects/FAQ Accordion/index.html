<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Accordion</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="shortcut icon" href="/faq-accordion-main/assets/images/favicon-32x32.png" type="image/x-icon">
</head>
<body>
    <header></header>

    <main>
        <section class="container description">
            <img src="/faq-accordion-main/assets/images/icon-star.svg" alt="purple star icon">
            <h1>FAQs</h1>
        </section>

        <section class="container accordion">
            <div class="questions">
                <p class="question">What is Frontend Mentor, and how will it help me?</p>
                <img src="/faq-accordion-main/assets/images/icon-plus.svg" alt="">
            </div>
            <div class="questions">
                <p class="question">Is Frontend Mentor free?</p>
                <img src="/faq-accordion-main/assets/images/icon-plus.svg" alt="">
            </div>
            <div class="questions">
                <p class="question">Can I use Frontend Mentor projects in my portfolio?</p>
                <img src="/faq-accordion-main/assets/images/icon-plus.svg" alt="">
            </div>
            <div class="questions">
                <p class="question">  How can I get help if I'm stuck on a Frontend Mentor challenge?</p>
                <img src="/faq-accordion-main/assets/images/icon-plus.svg" alt="">
            </div>
        </section>
    </main>
</body>
</html>
