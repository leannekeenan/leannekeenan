<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Summary</title>
    <link rel="shortcut icon" href="/Front End Mentor Projects/Results Summary/results-summary-component-main/results-summary-component-main/assets/images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="/Front End Mentor Projects/Results Summary/style.css
    ">
    <link rel="stylesheet" href="/Front End Mentor Projects/Results Summary/mobile.css
    ">
</head>
<body>
    <main class="container">

        <section class="content result-container">
            <h2 class="headline">Your Result</h3>

            <div class="circle">
                <div class="result">
                    <h1 class="result-value"></h1>
                    <span>of 100</span>
                </div>
            </div>

            <div class="result-details">
                <h2 class=" detail result-adjective"></h2>
                <p class=" detail result-explanation"></p>
            </div>
        </section>


        <section class="content summary-container">
            <div class="header">
                <h3 class="headline">Summary</h3>
            </div>

            <div class="scores">
                <div class="score reaction">
                    <div class="score-type">
                        <img src="/Front End Mentor Projects/Results Summary/results-summary-component-main/results-summary-component-main/assets/images/icon-reaction.svg" alt="">
                        <span>Reaction</span>
                    </div>
                    <div class="score-total">
                        <h4><span class="score reaction-score"></span>/100</h4>
                    </div>
                </div>
                <div class="score memory">
                    <div class="score-type">
                        <img src="/Front End Mentor Projects/Results Summary/results-summary-component-main/results-summary-component-main/assets/images/icon-memory.svg">
                        <span>Memory</span>
                    </div>
                    <div class="score-total">
                        <h4><span class="score memory-score"></span>/100</h4>
                    </div>
                </div>
                <div class="score verbal">
                    <div class="score-type">
                        <img src="/Front End Mentor Projects/Results Summary/results-summary-component-main/results-summary-component-main/assets/images/icon-verbal.svg">
                        <span>Verbal</span>
                    </div>
                    <div class="score-total">
                        <h4><span class="score verbal-score"></span>/100</h4>
                    </div>
                </div>
                <div class="score visual">
                    <div class="score-type">
                        <img src="/Front End Mentor Projects/Results Summary/results-summary-component-main/results-summary-component-main/assets/images/icon-visual.svg">
                        <span>Visual</span>
                    </div>
                    <div class="score-total">
                        <h4><span class="score visual-score"></span>/100</h4>
                    </div>
                </div>
            </div>

            <a class="btn" href="" class="continue">Continue</a>
        </section>
<script src="/Front End Mentor Projects/Results Summary/script.js"></script>
    </main>
</body>
</html>
