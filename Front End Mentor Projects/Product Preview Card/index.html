<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Preview Card</title>
    <link rel="shortcut icon" href="/product-preview-card-component-main/product-preview-card-component-main/images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="/Front End Mentor Projects/Product Preview Card/style.css">
    <link rel="stylesheet" href="/Front End Mentor Projects/Product Preview Card/mobile.css">
</head>
<body>
    <main class="card">
        <div class="product">
            <img src="/Front End Mentor Projects/Product Preview Card/product-preview-card-component-main/product-preview-card-component-main/images/image-product-desktop.jpg" alt="product image of a bottle of Channel perfume">
        </div>

        <div class="content">
            <span class="product-type">Perfume</span>

            <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>

            <p class="product-description">
                A floral, solar and voluptuous interpretation composed by Olivier Polge, 
                Perfumer-Creator for the House of CHANEL.
            </p>

            <div class="product-price">
                <p class="price current-price">$149.99</p>
                <p class="price previous-price">$169.99</p>
            </div>

            <a href="" class="btn">
                <img src="/Front End Mentor Projects/Product Preview Card/product-preview-card-component-main/product-preview-card-component-main/images/icon-cart.svg" alt="">
                <span class="add">Add to Cart</span>
            </a>
            
        </div>
    </main>
</body>
</html>
