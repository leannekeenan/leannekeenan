<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracking Dashboard</title>
    <link rel="shortcut icon" href="/Front End Mentor Projects/Time Tracking Dashboard/time-tracking-dashboard-main/time-tracking-dashboard-main/images/favicon-32x32.png" type="image/x-icon">
    <!--<link rel="stylesheet" href="/Front End Mentor Projects/Time Tracking Dashboard/project/style.css">-->
    <link rel="stylesheet" href="/Front End Mentor Projects/Time Tracking Dashboard/project/mobile.css">
</head>
<body>
    <main class="container">

        <div class="user">

            <div class="card">

                <img src="" alt="user image">

                <div class="user-details">
                    <span>This is for</span>

                    <h1 class="user-name">Name</h1>
                </div>

            </div>

            <div class="stat-options">

                <a id="daily" href="">Daily</a>
                <a id="weekly" href="">Weekly</a>
                <a id="monthly" href="">Monthly</a>

            </div>

        </div>

        <div class="dashboard">
            <div class="stat work" id="work">
                <div class="report">
                    <header>
                        <span class="stat-type">Work</span>
                        <a><img src="/Front End Mentor Projects/Time Tracking Dashboard/time-tracking-dashboard-main/time-tracking-dashboard-main/images/icon-ellipsis.svg" alt="ellipsis"></a>
                    </header>

                    <h2 class="time-spent"><span class="time-value" id="work-hours">hrs</span></h2>

                    <div class="last-week">
                        <h4>Last Week - <span class="previous-time-value" id="work-hours-lw"></span>hrs</h4>
                    </div>
                </div>
            </div>

            <div class="stat play" id="play">
                <div class="report">
                    <header>
                        <span class="stat-type">Play</span>
                        <a><img src="/Front End Mentor Projects/Time Tracking Dashboard/time-tracking-dashboard-main/time-tracking-dashboard-main/images/icon-ellipsis.svg" alt="ellipsis"></a>
                    </header>

                    <h2 class="time-spent"><span class="time-value" id="play-hours">hrs</span></h2>

                    <div class="last-week">
                        <h4>Last Week - <span class="previous-time-value" id="play-hours-lw"></span>hrs</h4>
                    </div>
                </div>
            </div>

            <div class="stat study" id="study">
                <div class="report">
                    <header>
                        <span class="stat-type">Study</span>
                        <a><img src="/Front End Mentor Projects/Time Tracking Dashboard/time-tracking-dashboard-main/time-tracking-dashboard-main/images/icon-ellipsis.svg" alt="ellipsis"></a>
                    </header>

                    <h2 class="time-spent"><span class="time-value" id="study-hours">hrs</span></h2>

                    <div class="last-week">
                        <h4>Last Week - <span class="previous-time-value" id="study-hours-lw"></span>hrs</h4>
                    </div>
                </div>
            </div>

            <div class="stat exercise" id="exercise">
                <div class="report">
                    <header>
                        <span class="stat-type">Exercise</span>
                        <a><img src="/Front End Mentor Projects/Time Tracking Dashboard/time-tracking-dashboard-main/time-tracking-dashboard-main/images/icon-ellipsis.svg" alt="ellipsis"></a>
                    </header>

                    <h2 class="time-spent"><span class="time-value" id="exercise-hours">hrs</span></h2>

                    <div class="last-week">
                        <h4>Last Week - <span class="previous-time-value" d="exercise-hours-lw"></span>hrs</h4>
                    </div>
                </div>
            </div>

            <div class="stat social" id="social">
                <div class="report">
                    <header>
                        <span class="stat-type">Social</span>
                        <a><img src="/Front End Mentor Projects/Time Tracking Dashboard/time-tracking-dashboard-main/time-tracking-dashboard-main/images/icon-ellipsis.svg" alt="ellipsis"></a>
                    </header>

                    <h2 class="time-spent"><span class="time-value" id="social-hours">hrs</span></h2>

                    <div class="last-week">
                        <h4>Last Week - <span class="previous-time-value" id="social-hours-lw"></span>hrs</h4>
                    </div>
                </div>
            </div>

            <div class="stat personal" id="personal">
                <div class="report">
                    <header>
                        <span class="stat-type">Self Care</span>
                        <a><img src="/Front End Mentor Projects/Time Tracking Dashboard/time-tracking-dashboard-main/time-tracking-dashboard-main/images/icon-ellipsis.svg" alt="ellipsis"></a>
                    </header>

                    <h2 class="time-spent"><span class="time-value" id="personal-hours">hrs</span></h2>

                    <div class="last-week">
                        <h4>Last Week - <span class="previous-time-value" id="personal-hours-lw"></span>hrs</h4>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/Front End Mentor Projects/Time Tracking Dashboard/project/script.js"></script>
</body>
</html>
