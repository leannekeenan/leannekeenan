<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="form" novalidate>
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" />
          <span aria-live="polite" id="name-error"></span>
        </div>
        <div>
          <label for="email">Email address</label>
          <input autofocus class="dkh-form-field__input" type="text" name="email" id="email" required placeholder="Email">
          <span aria-live="polite" id="email-error"></span>
        </div>
        <div>
          <label for="password">Password</label>
          <input class="dkh-form-field__input" name="password" type="password" id="password" required placeholder="Password">
          <span aria-live="polite" id="password-error"></span>
        </div>
        <div>
          <label for="confirm-password">Re-enter password</label>
          <input id="confirm-password" name="confirm-password" type="password" />
          <span aria-live="polite" id="confirm-password-error"></span>
        </div>
          
        <button>Submit</button>
      </form>

      <script src="/Front End Mentor Projects/Form Template/script.js"></script>
</body>
</html>
