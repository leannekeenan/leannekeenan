


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Rating Component
    </title>
    <link rel="stylesheet" href="/Front End Mentor Projects/Interactive Rating Component/style.css">
    <link rel="shortcut icon" href="/interactive-rating-component-main/images/favicon-32x32.png" type="image/x-icon">
</head>
<body>
    <main class="container thank">
        <picture class="image credit">
            <img src="/Front End Mentor Projects/Interactive Rating Component/interactive-rating-component-main/interactive-rating-component-main/images/illustration-thank-you.svg" alt="">
        </picture>

        <section class="selection">
            <h1 class="selected">You selected 
                <span class="choice" id="choice"></span> 
                out of 5
            </h1>
        </section>

        <section class="text-container">
            <h2 class="thank-you">Thank you!</h2>
            <p class="appreciate">  We appreciate you taking the time to give a rating. If you ever need more support, 
                don’t hesitate to get in touch!</p>
        </section>
    </main>
</body>
<script src="/Front End Mentor Projects/Interactive Rating Component/script.js"></script>
</html>
