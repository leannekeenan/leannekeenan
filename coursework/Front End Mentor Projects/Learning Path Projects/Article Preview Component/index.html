<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Preview Component</title>
    <link rel="stylesheet" href="/Front End Mentor Projects/Learning Path Projects/Article Preview Component/style.css">

<body>
    <main class="container">


        <section class="product porduct-image">
            <picture class="image">
                <img class="drawers" src="/Front End Mentor Projects/Learning Path Projects/Article Preview Component/article-preview-component-master/article-preview-component-master/images/drawers.jpg" alt="green end table decorated with a beige vase holding catail-style flowers of the same color.  There are also two photographs on the table: one directly behind the vase so its image is obscured, and another to the left of a print saying 'love will keep us alive'. This is all set to a white brick wall backdrop">

                    Shift the overall look and feel by adding these wonderful

                </h1>
    
                <p class="product-pitch">
                    Ever been in a room and felt like something was missing? Perhaps it felt slightly bare and uninviting. I’ve got some simple tips to help you make any room feel complete
                </p>
            </div>

            <div class="more">
                <section class="author">
                    <picture class="author-image">
                        <img src="/Front End Mentor Projects/Learning Path Projects/Article Preview Component/article-preview-component-master/article-preview-component-master/images/avatar-michelle.jpg" alt="">
                    </picture>

                    <div class="author-details">
                        <h2 class="author-name">Michelle Appleton</h2>
                        <span class="article-date">28 Jun 2020</span>
                    </div>
                </section>

                <section class="share">

                    <picture class="share-icon">
                        <img src="/Front End Mentor Projects/Learning Path Projects/Article Preview Component/article-preview-component-master/article-preview-component-master/images/icon-share.svg" alt="">
                    </picture>

                    <div class="tooltiptext">
                        <span>SHARE</span>
                        <ul>
                            <a href="https://example.com"><img src="/Front End Mentor Projects/Learning Path Projects/Article Preview Component/article-preview-component-master/article-preview-component-master/images/icon-facebook.svg" alt="">
                            </a>
    
                            <a href="https://example.org"><img src="/Front End Mentor Projects/Learning Path Projects/Article Preview Component/article-preview-component-master/article-preview-component-master/images/icon-pinterest.svg" alt="">
                            </a>
    
                            <a href="https://example.net"><img src="/Front End Mentor Projects/Learning Path Projects/Article Preview Component/article-preview-component-master/article-preview-component-master/images/icon-twitter.svg" alt="">
                            </a>

                </section>
