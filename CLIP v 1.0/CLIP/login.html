<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/assets/css/user form.css">
</head>
<body>
    <header>
        <span class="logo"><a href="index.html">CLIP</a></span>        
    </header>

   
    <div class="container">
        <div class="form-box glass">
            <h2>Login</h2>
            <form action="time management.html">          
                    <div class="input-box" id="emailAddress">
                        <span class="icon">
                            <img src="https://api.iconify.design/streamline:sign-at-solid.svg?color=%232b2d42" alt="email-icon">
                        </span>
                        <input type="email" name="user-email" placeholder="Email Address" id="user-email">
                    </div>

                    <div class="input-box" id="password">
                        <span class="icon">
                            <img src="https://api.iconify.design/ri:lock-password-line.svg?color=%232b2d42" alt="create-password-icon">
                        </span>
                        <input type="password" name="user-password" placeholder="Password" id="user-password">
                    </div>   
                    
                    <div class="options">
                        <label for="">
                            <input type="checkbox" name="" id="">
                            Remember Me
                        </label>
                        <div>
                            <h3>Need an account? <a href="signup.html">Signup</a></h3>
                        </div>
                    </div>

                    <button type="submit" class="submit">Submit</button>
            </form>
            
        </div>
    </div>
<script src="/assets/js/login.js"></script>
</body>
</html>
